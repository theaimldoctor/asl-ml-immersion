project:
  project_id: "avid-glazing-495107-i4"
  region: "us-central1"
  bucket: "avid-glazing-495107-i4-medfocusguard"
  bq_dataset: "medfocusguard_research"
  bq_table: "experiment_metrics"

experiment:
  name: "phase1_gcp_smoke"
  max_samples: 3
  seed: 42

paths:
  metadata_file: "medfocus_defense/data/smoke_test/metadata/samples.jsonl"
  local_output_dir: "medfocus_defense/outputs"

attack:
  variants:
    - "clean"
    - "background_noise"
    - "foreground_noise"
    - "foreground_background_noise"
    - "background_adversarial"

defense:
  configs_to_test:
    - "no_defense"
    - "gate2_only"
    - "gate1_gate2"
    - "gate2_prompt_steering"
    - "full_system"

  gate1:
    threshold: 0.55

  gate2:
    threshold: 0.60
    k_bg: 3
    k_fg: 1

  steering:
    max_rechecks: 1
    template: "evidence_first_foreground_grounded"

logging:
  upload_to_gcs: true
  insert_to_bigquery: true
