project:
  project_id: "avid-glazing-495107-i4"
  region: "us-central1"
  bucket: "avid-glazing-495107-i4-medfocusguard"
  bq_dataset: "medfocusguard_research"
  bq_table: "experiment_metrics"

experiment:
  name: "phase2_real_gate2"
  max_samples: 3
  seed: 42

paths:
  metadata_file: "medfocus_defense/data/smoke_test/metadata/samples.jsonl"
  local_output_dir: "medfocus_defense/outputs"

mask:
  foreground_value: 255
  invert_mask: false

gate2:
  k_bg: 3
  k_fg: 1
  threshold: 0.60
  interventions:
    background:
      - "blur"
      - "local_mean"
      - "neutral_replace"
    foreground:
      - "blur"

victim:
  backend: "stub"
  prompt: "Describe the clinical findings in this image."

logging:
  upload_to_gcs: true
  insert_to_bigquery: true
